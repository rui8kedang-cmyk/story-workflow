<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 偏好分析工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #161b24;
      --surface2: #1e2535;
      --border: #2a3347;
      --accent1: #7c6af7;
      --accent2: #3db8a4;
      --green: #4cca74;
      --red: #f05555;
      --text: #dce3f0;
      --muted: #6b7a99;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; padding: 40px; }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 32px; margin-bottom: 8px; }
    header p { color: var(--muted); font-size: 14px; }
    
    .tabs { display: flex; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .tab { padding: 12px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
    .tab:hover { background: var(--surface2); }
    .tab.active { background: var(--accent1); border-color: var(--accent1); }
    
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; display: none; }
    .panel.active { display: block; }
    
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .panel-header h2 { font-size: 18px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    
    .btn { padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all .2s; }
    .btn-primary { background: var(--accent1); color: white; }
    .btn-primary:hover { background: #6b59e6; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-success { background: var(--green); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn-accent { background: var(--accent2); color: white; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    
    .story-list { display: flex; flex-direction: column; gap: 12px; }
    .story-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .story-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .story-card-header h3 { font-size: 15px; flex: 1; }
    .story-card-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .story-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    
    .preference-result { background: rgba(124,106,247,0.1); border: 1px solid var(--accent1); border-radius: 8px; padding: 20px; margin-top: 24px; }
    .preference-result h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent1); }
    .preference-item { margin-bottom: 12px; }
    .preference-item label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
    .preference-item span { font-size: 14px; }
    
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; animation: slideIn .3s; }
    .toast.success { background: var(--green); color: white; }
    .toast.error { background: var(--red); color: white; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .loading { opacity: .6; pointer-events: none; }
    .loading::after { content: '...'; animation: dots 1s infinite; }
    @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
    
    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: bold; color: var(--accent1); }
    .stat-box .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    
    .section-title { font-size: 14px; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    
    footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 12px; }
    
    .config-row { display: flex; gap: 12px; align-items: flex-end; }
    .config-row .form-group { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 偏好分析工具</h1>
      <p>分析你的故事偏好，生成可复用的偏好技能文件</p>
    </header>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('main')">🎛️ 总控面板</div>
      <div class="tab" onclick="switchTab('manual')">✏️ 手动输入故事</div>
      <div class="tab" onclick="switchTab('modify')">🔄 修改评价对比</div>
    </div>
    
    <!-- Panel 1: 总控面板 -->
    <div class="panel active" id="panel-main">
      <div class="panel-header">
        <h2>🎛️ 总控面板</h2>
      </div>
      
      <!-- 统计数据 -->
      <div class="stats-grid">
        <div class="stat-box">
          <div class="num" id="stat-manual">0</div>
          <div class="label">手动输入故事</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-modify">0</div>
          <div class="label">修改对比项</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-total">0</div>
          <div class="label">总数据条数</div>
        </div>
      </div>
      
      <!-- AI 配置（已继承主流程，默认隐藏，需要时展开） -->
      <details style="margin-bottom:24px">
        <summary style="cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:12px">🔧 AI 接口配置（点击展开，已与主流程共享）</summary>
        <div class="config-row">
          <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="ai-base-url" placeholder="如：https://api.openai.com" />
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="ai-api-key" placeholder="sk-..." />
          </div>
          <div class="form-group">
            <label>模型</label>
            <input type="text" id="ai-model" placeholder="gpt-4o" />
          </div>
          <button class="btn btn-ghost" onclick="saveAIConfig()">💾 保存配置</button>
        </div>
      </details>
      
      <!-- 主要操作 -->
      <div class="section-title" style="margin-top:24px">🎯 核心操作</div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-analyze" onclick="analyzeAll()">
          <span>🧠</span> 偏好分析
        </button>
        <button class="btn btn-success" onclick="exportSkill()">
          <span>📦</span> 结果输出 (Skill)
        </button>
      </div>
      
      <!-- 配置管理 -->
      <div class="section-title">💾 数据管理</div>
      <div class="btn-group">
        <button class="btn btn-accent" onclick="saveAllData()">
          <span>💾</span> 保存全部数据
        </button>
        <button class="btn btn-ghost" onclick="loadAllData()">
          <span>📂</span> 读取保存数据
        </button>
        <button class="btn btn-ghost" onclick="downloadDataFile()">
          <span>📥</span> 下载数据文件
        </button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">
          <span>📤</span> 导入数据文件
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importDataFile(event)" />
      </div>
      
      <!-- 分析结果 -->
      <div class="preference-result" id="result-panel" style="display:none">
        <h3>📊 偏好分析结果</h3>
        <div id="result-content"></div>
      </div>
    </div>
    
    <!-- Panel 2: 手动输入故事 -->
    <div class="panel" id="panel-manual">
      <div class="panel-header">
        <h2>✏️ 手动输入你的故事</h2>
      </div>
      
      <div id="manual-stories" class="story-list"></div>
      
      <div style="margin-top:16px">
        <button class="btn btn-ghost" onclick="addManualStory()">
          <span>➕</span> 添加故事
        </button>
      </div>
    </div>
    
    <!-- Panel 3: 修改评价对比 -->
    <div class="panel" id="panel-modify">
      <div class="panel-header">
        <h2>🔄 修改前后对比分析</h2>
      </div>
      
      <div id="modify-list"></div>
      
      <div style="margin-top:16px">
        <button class="btn btn-ghost" onclick="addModifyItem()">
          <span>➕</span> 添加对比项
        </button>
      </div>
    </div>
    
    <footer>
      <p>偏好分析用于优化主流程的创意生成质量</p>
    </footer>
  </div>

  <script>
    // 数据存储
    let manualStories = [];
    let modifyItems = [];
    let currentPreference = null;
    
    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
      loadAIConfig();
      loadFromStorage();
      updateStats();
      
      // 默认添加两个输入框
      if (manualStories.length === 0) {
        addManualStory();
        addManualStory();
      } else {
        renderManualStories();
      }
      
      if (modifyItems.length === 0) {
        addModifyItem();
      } else {
        renderModifyItems();
      }
    });
    
    // ========== Tab 切换 ==========
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
      
      if (tabName === 'main') {
        updateStats();
      }
    }
    
    // ========== AI 配置 ==========
    // 使用主流程的配置 key，实现配置共享
    function loadAIConfig() {
      document.getElementById('ai-base-url').value = localStorage.getItem('ai_base_url') || '';
      document.getElementById('ai-api-key').value = localStorage.getItem('ai_api_key') || '';
      document.getElementById('ai-model').value = localStorage.getItem('ai_model') || 'gpt-4o';
    }
    
    function saveAIConfig() {
      localStorage.setItem('ai_base_url', document.getElementById('ai-base-url').value.trim());
      localStorage.setItem('ai_api_key', document.getElementById('ai-api-key').value.trim());
      localStorage.setItem('ai_model', document.getElementById('ai-model').value.trim());
      toast('AI 配置已保存（与主流程共享）', 'success');
    }
    
    function getAIConfig() {
      return {
        baseUrl: document.getElementById('ai-base-url').value.trim() || localStorage.getItem('ai_base_url') || '',
        apiKey: document.getElementById('ai-api-key').value.trim() || localStorage.getItem('ai_api_key') || '',
        model: document.getElementById('ai-model').value.trim() || localStorage.getItem('ai_model') || 'gpt-4o'
      };
    }
    
    // ========== 统计更新 ==========
    function updateStats() {
      const manualCount = collectManualStories().length;
      const modifyCount = collectModifyItems().length;
      document.getElementById('stat-manual').textContent = manualCount;
      document.getElementById('stat-modify').textContent = modifyCount;
      document.getElementById('stat-total').textContent = manualCount + modifyCount;
    }
    
    // ========== 手动输入故事 ==========
    let manualStoryCount = 0;
    
    function addManualStory(data = null) {
      manualStoryCount++;
      const container = document.getElementById('manual-stories');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `manual-${manualStoryCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>故事 ${manualStoryCount}</h3>
          <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeManualStory(${manualStoryCount})">🗑️ 删除</button>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" class="manual-title" placeholder="故事标题" value="${data?.title || ''}" />
        </div>
        <div class="form-group">
          <label>故事内容</label>
          <textarea class="manual-story" placeholder="详细描述故事">${data?.story || ''}</textarea>
        </div>
        <div class="form-group">
          <label>标签（用逗号分隔）</label>
          <input type="text" class="manual-tags" placeholder="温情, 成长, 反转" value="${data?.tags?.join(', ') || ''}" />
        </div>
      `;
      container.appendChild(div);
      
      // 输入变化时自动保存
      div.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => {
          saveToStorage();
          updateStats();
        });
      });
    }
    
    function removeManualStory(id) {
      document.getElementById(`manual-${id}`)?.remove();
      saveToStorage();
      updateStats();
    }
    
    function renderManualStories() {
      const container = document.getElementById('manual-stories');
      container.innerHTML = '';
      manualStories.forEach(s => addManualStory(s));
    }
    
    function collectManualStories() {
      const stories = [];
      document.querySelectorAll('#manual-stories .story-card').forEach(card => {
        const title = card.querySelector('.manual-title')?.value?.trim();
        const story = card.querySelector('.manual-story')?.value?.trim();
        const tagsStr = card.querySelector('.manual-tags')?.value || '';
        if (title && story) {
          stories.push({
            title,
            story,
            tags: tagsStr.split(',').map(t => t.trim()).filter(t => t)
          });
        }
      });
      return stories;
    }
    
    // ========== 修改评价对比 ==========
    let modifyCount = 0;
    
    function addModifyItem(data = null) {
      modifyCount++;
      const container = document.getElementById('modify-list');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `modify-${modifyCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>对比项 ${modifyCount}</h3>
          <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeModifyItem(${modifyCount})">🗑️ 删除</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div class="form-group">
              <label>修改前（原始版本）</label>
              <textarea class="modify-before" placeholder="原始故事内容">${data?.before || ''}</textarea>
            </div>
            <div class="form-group">
              <label>为什么不满意</label>
              <textarea class="modify-before-reason" placeholder="描述不满意的原因">${data?.beforeReason || ''}</textarea>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>修改后（改进版本）</label>
              <textarea class="modify-after" placeholder="修改后的故事内容">${data?.after || ''}</textarea>
            </div>
            <div class="form-group">
              <label>为什么满意</label>
              <textarea class="modify-after-reason" placeholder="描述满意的原因">${data?.afterReason || ''}</textarea>
            </div>
          </div>
        </div>
      `;
      container.appendChild(div);
      
      // 输入变化时自动保存
      div.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => {
          saveToStorage();
          updateStats();
        });
      });
    }
    
    function removeModifyItem(id) {
      document.getElementById(`modify-${id}`)?.remove();
      saveToStorage();
      updateStats();
    }
    
    function renderModifyItems() {
      const container = document.getElementById('modify-list');
      container.innerHTML = '';
      modifyItems.forEach(item => addModifyItem(item));
    }
    
    function collectModifyItems() {
      const items = [];
      document.querySelectorAll('#modify-list .story-card').forEach(card => {
        const before = card.querySelector('.modify-before')?.value?.trim();
        const after = card.querySelector('.modify-after')?.value?.trim();
        if (before && after) {
          items.push({
            before,
            beforeReason: card.querySelector('.modify-before-reason')?.value?.trim() || '',
            after,
            afterReason: card.querySelector('.modify-after-reason')?.value?.trim() || ''
          });
        }
      });
      return items;
    }
    
    // ========== 本地存储 ==========
    function saveToStorage() {
      const data = {
        manualStories: collectManualStories(),
        modifyItems: collectModifyItems(),
        savedAt: new Date().toISOString()
      };
      localStorage.setItem('pref_tool_data', JSON.stringify(data));
    }
    
    function loadFromStorage() {
      try {
        const saved = localStorage.getItem('pref_tool_data');
        if (saved) {
          const data = JSON.parse(saved);
          manualStories = data.manualStories || [];
          modifyItems = data.modifyItems || [];
        }
      } catch (e) {
        console.error('加载存储数据失败', e);
      }
    }
    
    // ========== 数据管理按钮 ==========
    function saveAllData() {
      saveToStorage();
      toast('数据已保存到浏览器本地', 'success');
    }
    
    function loadAllData() {
      loadFromStorage();
      renderManualStories();
      renderModifyItems();
      updateStats();
      toast('数据已恢复', 'success');
    }
    
    function downloadDataFile() {
      const data = {
        manualStories: collectManualStories(),
        modifyItems: collectModifyItems(),
        exportedAt: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `preference-data-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('数据文件已下载', 'success');
    }
    
    function importDataFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.manualStories) manualStories = data.manualStories;
          if (data.modifyItems) modifyItems = data.modifyItems;
          
          renderManualStories();
          renderModifyItems();
          saveToStorage();
          updateStats();
          toast('数据导入成功', 'success');
        } catch (err) {
          toast('导入失败：文件格式错误', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    
    // ========== 偏好分析 ==========
    async function analyzeAll() {
      const manual = collectManualStories();
      const modify = collectModifyItems();
      
      if (manual.length === 0 && modify.length === 0) {
        toast('请至少输入一些故事或对比数据', 'error');
        return;
      }
      
      const cfg = getAIConfig();
      if (!cfg.apiKey) {
        toast('请先在主流程配置 AI 接口，或展开上方的 AI 配置栏', 'error');
        return;
      }
      
      const btn = document.getElementById('btn-analyze');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span>⏳</span> 分析中...';
      btn.disabled = true;
      
      // 显示加载状态
      document.getElementById('result-panel').style.display = 'block';
      document.getElementById('result-content').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">🔄 正在分析中，请稍候...</div>';
      
      // 构建综合分析 prompt
      let prompt = `你是一位专业的用户偏好分析师。
请综合分析以下数据，总结用户的创作偏好。

`;
      
      if (manual.length > 0) {
        prompt += `【手动输入的喜欢的故事】(${manual.length} 个)\n`;
        prompt += manual.map((s, i) => `
【故事${i+1}】${s.title}
内容：${s.story}
标签：${s.tags?.join('、') || '无'}
`).join('\n');
        prompt += '\n\n';
      }
      
      if (modify.length > 0) {
        prompt += `【修改前后对比数据】(${modify.length} 组)\n`;
        prompt += modify.map((item, i) => `
【对比${i+1}】
修改前：${item.before}
不满意原因：${item.beforeReason}
修改后：${item.after}
满意原因：${item.afterReason}
`).join('\n---\n');
      }
      
      prompt += `

请按以下 JSON 格式输出，不要其他文字：
{
  "preferredThemes": ["偏好主题1", "偏好主题2"],
  "avoidedThemes": ["避免主题1", "避免主题2"],
  "visualStyle": "画风倾向描述（简短）",
  "storyStructure": "故事结构偏好描述（简短）",
  "narrativeStyle": "叙事风格偏好（如：反转、温情、幽默）",
  "targetAudience": "目标受众推断",
  "keyElements": ["关键元素1", "关键元素2"],
  "coreConcepts": ["核心概念1", "核心概念2"],
  "suggestions": "给用户的具体建议"
}`;
      
      try {
        const res = await fetch(cfg.baseUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + cfg.apiKey
          },
          body: JSON.stringify({
            model: cfg.model,
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.3
          })
        });
        
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error?.message || `HTTP ${res.status}: ${res.statusText}`);
        }
        
        const data = await res.json();
        const reportText = data.choices?.[0]?.message?.content;
        
        if (!reportText) {
          throw new Error('AI 返回内容为空');
        }
        
        // 尝试解析 JSON
        let report;
        try {
          // 尝试提取 JSON 部分
          const jsonMatch = reportText.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            report = JSON.parse(jsonMatch[0]);
          } else {
            report = JSON.parse(reportText);
          }
        } catch (parseErr) {
          throw new Error('AI 返回格式错误，无法解析 JSON');
        }
        
        currentPreference = {
          analyzedAt: new Date().toLocaleString(),
          sourceCount: { manual: manual.length, modify: modify.length },
          report
        };
        
        displayResult();
        toast('偏好分析完成！', 'success');
      } catch (e) {
        document.getElementById('result-content').innerHTML = `<div style="color:var(--red);padding:20px">❌ 分析失败：${e.message}<br><br><small style="color:var(--muted)">请检查 AI 配置是否正确</small></div>`;
        toast('分析失败：' + e.message, 'error');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
    
    function displayResult() {
      if (!currentPreference) return;
      const r = currentPreference.report;
      const container = document.getElementById('result-content');
      container.innerHTML = `
        <div class="preference-item">
          <label>分析时间</label>
          <span>${currentPreference.analyzedAt}</span>
        </div>
        <div class="preference-item">
          <label>数据来源</label>
          <span>手动故事 ${currentPreference.sourceCount.manual} 条 + 对比数据 ${currentPreference.sourceCount.modify} 条</span>
        </div>
        ${r.preferredThemes?.length ? `<div class="preference-item"><label>✅ 偏好主题</label><span>${r.preferredThemes.join('、')}</span></div>` : ''}
        ${r.avoidedThemes?.length ? `<div class="preference-item"><label>❌ 避免主题</label><span>${r.avoidedThemes.join('、')}</span></div>` : ''}
        ${r.visualStyle ? `<div class="preference-item"><label>🎨 画风倾向</label><span>${r.visualStyle}</span></div>` : ''}
        ${r.storyStructure ? `<div class="preference-item"><label>📖 故事结构</label><span>${r.storyStructure}</span></div>` : ''}
        ${r.narrativeStyle ? `<div class="preference-item"><label>🎭 叙事风格</label><span>${r.narrativeStyle}</span></div>` : ''}
        ${r.targetAudience ? `<div class="preference-item"><label>👥 目标受众</label><span>${r.targetAudience}</span></div>` : ''}
        ${r.keyElements?.length ? `<div class="preference-item"><label>🔑 关键元素</label><span>${r.keyElements.join('、')}</span></div>` : ''}
        ${r.coreConcepts?.length ? `<div class="preference-item"><label>💡 核心概念</label><span>${r.coreConcepts.join('、')}</span></div>` : ''}
        ${r.suggestions ? `<div class="preference-item"><label>📝 建议</label><span>${r.suggestions}</span></div>` : ''}
      `;
      document.getElementById('result-panel').style.display = 'block';
    }
    
    // ========== 导出 Skill ==========
    function exportSkill() {
      if (!currentPreference) {
        toast('请先进行偏好分析', 'error');
        return;
      }
      
      const r = currentPreference.report;
      const skill = {
        name: "用户故事偏好",
        description: "基于用户历史数据的故事创作偏好",
        version: "1.0",
        createdAt: new Date().toISOString(),
        preference: {
          themes: {
            preferred: r.preferredThemes || [],
            avoided: r.avoidedThemes || []
          },
          style: {
            visual: r.visualStyle || '',
            narrative: r.narrativeStyle || '',
            structure: r.storyStructure || ''
          },
          elements: r.keyElements || [],
          coreConcepts: r.coreConcepts || [],
          targetAudience: r.targetAudience || '',
          suggestions: r.suggestions || ''
        },
        metadata: {
          analyzedAt: currentPreference.analyzedAt,
          sourceCount: currentPreference.sourceCount
        }
      };
      
      const blob = new Blob([JSON.stringify(skill, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `preference-skill-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Skill 文件已下载', 'success');
    }
    
    // ========== Toast ==========
    function toast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
