<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 偏好分析工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #161b24;
      --surface2: #1e2535;
      --border: #2a3347;
      --accent1: #7c6af7;
      --accent2: #3db8a4;
      --green: #4cca74;
      --red: #f05555;
      --text: #dce3f0;
      --muted: #6b7a99;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; padding: 40px; }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 32px; margin-bottom: 8px; }
    header p { color: var(--muted); font-size: 14px; }
    
    .tabs { display: flex; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .tab { padding: 12px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
    .tab:hover { background: var(--surface2); }
    .tab.active { background: var(--accent1); border-color: var(--accent1); }
    
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; display: none; }
    .panel.active { display: block; }
    
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .panel-header h2 { font-size: 18px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px; }
    .form-group textarea { min-height: 120px; resize: vertical; }
    
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; }
    .btn-primary { background: var(--accent1); color: white; }
    .btn-primary:hover { background: #6b59e6; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-success { background: var(--green); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    
    .story-list { display: flex; flex-direction: column; gap: 12px; }
    .story-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .story-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .story-card-header h3 { font-size: 15px; flex: 1; }
    .story-card-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .story-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    
    .preference-result { background: rgba(124,106,247,0.1); border: 1px solid var(--accent1); border-radius: 8px; padding: 20px; margin-top: 24px; }
    .preference-result h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent1); }
    .preference-item { margin-bottom: 12px; }
    .preference-item label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
    .preference-item span { font-size: 14px; }
    
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; animation: slideIn .3s; }
    .toast.success { background: var(--green); color: white; }
    .toast.error { background: var(--red); color: white; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .loading { opacity: .6; pointer-events: none; }
    .loading::after { content: '...'; animation: dots 1s infinite; }
    @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
    
    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    
    .edit-area { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 12px; display: none; }
    .edit-area.active { display: block; }
    
    footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 12px; }
    footer a { color: var(--accent1); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 偏好分析工具</h1>
      <p>分析你的故事偏好，生成可复用的偏好报告</p>
    </header>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('fetch')">📥 拉取主流程数据</div>
      <div class="tab" onclick="switchTab('manual')">✏️ 手动输入故事</div>
      <div class="tab" onclick="switchTab('modify')">🔄 修改评价对比</div>
    </div>
    
    <!-- Panel 1: 拉取主流程数据 -->
    <div class="panel active" id="panel-fetch">
      <div class="panel-header">
        <h2>📥 从主流程拉取已采纳故事</h2>
      </div>
      
      <div class="form-group">
        <label>主流程地址（GitHub Pages）</label>
        <input type="text" id="fetch-url" value="https://rui8kedang-cmyk.github.io/story-workflow/" placeholder="输入主流程的 GitHub Pages 地址" />
      </div>
      
      <button class="btn btn-primary" onclick="fetchApprovedStories()">
        <span>📥</span> 拉取已采纳故事
      </button>
      
      <div id="fetched-stories" style="margin-top:24px"></div>
    </div>
    
    <!-- Panel 2: 手动输入故事 -->
    <div class="panel" id="panel-manual">
      <div class="panel-header">
        <h2>✏️ 手动输入你的故事</h2>
      </div>
      
      <div id="manual-stories" class="story-list"></div>
      
      <button class="btn btn-ghost" style="margin-top:16px" onclick="addManualStory()">
        <span>➕</span> 添加故事
      </button>
    </div>
    
    <!-- Panel 3: 修改评价对比 -->
    <div class="panel" id="panel-modify">
      <div class="panel-header">
        <h2>🔄 修改前后对比分析</h2>
      </div>
      
      <div id="modify-list"></div>
      
      <button class="btn btn-ghost" style="margin-top:16px" onclick="addModifyItem()">
        <span>➕</span> 添加对比项
      </button>
    </div>
    
    <!-- 分析结果 -->
    <div class="preference-result" id="result-panel" style="display:none">
      <h3>📊 偏好分析结果</h3>
      <div id="result-content"></div>
      <div style="margin-top:20px">
        <button class="btn btn-success" onclick="downloadPreference()">
          <span>📥</span> 下载偏好报告
        </button>
        <button class="btn btn-ghost" style="margin-left:12px" onclick="copyPreference()">
          <span>📋</span> 复制到剪贴板
        </button>
      </div>
    </div>
    
    <footer>
      <p>偏好报告用于 <a href="https://rui8kedang-cmyk.github.io/story-workflow/" target="_blank">主流程</a> 的创意生成优化</p>
    </footer>
  </div>

  <script>
    // 数据存储
    let approvedStories = [];
    let manualStories = [];
    let modifyItems = [];
    let currentPreference = null;
    
    // AI 接口配置（从 localStorage 读取，或让用户配置）
    function getAIConfig() {
      return {
        baseUrl: localStorage.getItem('ai_base_url') || 'https://api.openai.com',
        apiKey: localStorage.getItem('ai_api_key') || '',
        model: localStorage.getItem('ai_model') || 'gpt-4o'
      };
    }
    
    // 切换 Tab
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
    }
    
    // ========== Panel 1: 拉取主流程数据 ==========
    async function fetchApprovedStories() {
      const url = document.getElementById('fetch-url').value.trim();
      if (!url) {
        toast('请输入主流程地址', 'error');
        return;
      }
      
      const btn = event.target;
      btn.classList.add('loading');
      btn.disabled = true;
      
      try {
        // 尝试拉取 approved-stories.json
        const res = await fetch(url.replace(/\/$/, '') + '/approved-stories.json?t=' + Date.now());
        if (!res.ok) throw new Error('拉取失败');
        const data = await res.json();
        approvedStories = data.stories || [];
        renderFetchedStories();
        toast(`成功拉取 ${approvedStories.length} 个故事`, 'success');
      } catch (e) {
        toast('拉取失败：请确保主流程已导出 approved-stories.json 并上传到 GitHub', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
    
    function renderFetchedStories() {
      const container = document.getElementById('fetched-stories');
      if (approvedStories.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无已采纳故事</div>';
        return;
      }
      
      container.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <span style="font-size:14px;color:var(--muted)">已加载 ${approvedStories.length} 个故事</span>
          <button class="btn btn-primary" onclick="analyzeFromFetch()">🧠 分析偏好</button>
        </div>
        <div class="story-list">
          ${approvedStories.map((s, i) => `
            <div class="story-card">
              <div class="story-card-header">
                <h3>${s.title || '未命名故事'}</h3>
                <span style="font-size:11px;color:var(--muted)">${s.tags?.join(' / ') || ''}</span>
              </div>
              <div class="story-card-body">
                <div><strong>核心概念：</strong>${s.concept || ''}</div>
                <div style="margin-top:8px"><strong>故事：</strong>${s.story || ''}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    async function analyzeFromFetch() {
      if (approvedStories.length < 3) {
        toast('至少需要 3 个故事才能分析', 'error');
        return;
      }
      await analyzePreference(approvedStories);
    }
    
    // ========== Panel 2: 手动输入故事 ==========
    let manualStoryCount = 0;
    
    function addManualStory() {
      manualStoryCount++;
      const container = document.getElementById('manual-stories');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `manual-${manualStoryCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>故事 ${manualStoryCount}</h3>
          <button class="btn btn-danger btn-sm" onclick="removeManualStory(${manualStoryCount})">🗑️ 删除</button>
        </div>
        <div class="form-group">
          <label>标题</label>
          <input type="text" class="manual-title" placeholder="故事标题" />
        </div>
        <div class="form-group">
          <label>核心概念</label>
          <input type="text" class="manual-concept" placeholder="一句话描述核心概念" />
        </div>
        <div class="form-group">
          <label>故事内容</label>
          <textarea class="manual-story" placeholder="详细描述故事"></textarea>
        </div>
        <div class="form-group">
          <label>标签（用逗号分隔）</label>
          <input type="text" class="manual-tags" placeholder="温情, 成长, 反转" />
        </div>
      `;
      container.appendChild(div);
    }
    
    function removeManualStory(id) {
      document.getElementById(`manual-${id}`).remove();
    }
    
    function collectManualStories() {
      const stories = [];
      document.querySelectorAll('#manual-stories .story-card').forEach(card => {
        stories.push({
          title: card.querySelector('.manual-title').value.trim(),
          concept: card.querySelector('.manual-concept').value.trim(),
          story: card.querySelector('.manual-story').value.trim(),
          tags: card.querySelector('.manual-tags').value.split(',').map(t => t.trim()).filter(t => t)
        });
      });
      return stories.filter(s => s.title && s.story);
    }
    
    async function analyzeFromManual() {
      const stories = collectManualStories();
      if (stories.length < 3) {
        toast('至少需要 3 个完整故事才能分析', 'error');
        return;
      }
      await analyzePreference(stories);
    }
    
    // ========== Panel 3: 修改评价对比 ==========
    let modifyCount = 0;
    
    function addModifyItem() {
      modifyCount++;
      const container = document.getElementById('modify-list');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `modify-${modifyCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>对比项 ${modifyCount}</h3>
          <button class="btn btn-danger btn-sm" onclick="removeModifyItem(${modifyCount})">🗑️ 删除</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div class="form-group">
              <label>修改前（原始版本）</label>
              <textarea class="modify-before" placeholder="原始故事内容"></textarea>
            </div>
            <div class="form-group">
              <label>为什么不满意</label>
              <textarea class="modify-before-reason" placeholder="描述不满意的原因"></textarea>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>修改后（改进版本）</label>
              <textarea class="modify-after" placeholder="修改后的故事内容"></textarea>
            </div>
            <div class="form-group">
              <label>为什么满意</label>
              <textarea class="modify-after-reason" placeholder="描述满意的原因"></textarea>
            </div>
          </div>
        </div>
      `;
      container.appendChild(div);
    }
    
    function removeModifyItem(id) {
      document.getElementById(`modify-${id}`).remove();
    }
    
    function collectModifyItems() {
      const items = [];
      document.querySelectorAll('#modify-list .story-card').forEach(card => {
        items.push({
          before: card.querySelector('.modify-before').value.trim(),
          beforeReason: card.querySelector('.modify-before-reason').value.trim(),
          after: card.querySelector('.modify-after').value.trim(),
          afterReason: card.querySelector('.modify-after-reason').value.trim()
        });
      });
      return items.filter(i => i.before && i.after);
    }
    
    async function analyzeFromModify() {
      const items = collectModifyItems();
      if (items.length < 2) {
        toast('至少需要 2 个完整对比项才能分析', 'error');
        return;
      }
      await analyzeFromModifyItems(items);
    }
    
    // ========== 核心分析逻辑 ==========
    async function analyzePreference(stories) {
      const cfg = getAIConfig();
      if (!cfg.apiKey) {
        toast('请先配置 AI 接口（点击右上角设置）', 'error');
        return;
      }
      
      const btn = event?.target;
      if (btn) {
        btn.classList.add('loading');
        btn.disabled = true;
      }
      
      const storyList = stories.map((s, i) => `【故事${i+1}】${s.title}\n核心概念：${s.concept || ''}\n内容：${s.story}\n标签：${s.tags?.join('、') || ''}`).join('\n\n');
      
      const prompt = `你是一位专业的用户偏好分析师。
请分析以下已采纳的故事，总结用户的创作偏好。

【已采纳故事】(${stories.length} 个)
${storyList}

请按以下 JSON 格式输出，不要其他文字：
{
  "preferredThemes": ["偏好主题1", "偏好主题2"],
  "avoidedThemes": ["避免主题1", "避免主题2"],
  "visualStyle": "画风倾向描述（简短）",
  "storyStructure": "故事结构偏好描述（简短）",
  "narrativeStyle": "叙事风格偏好（如：反转、温情、幽默）",
  "targetAudience": "目标受众推断",
  "keyElements": ["关键元素1", "关键元素2"],
  "suggestions": "给用户的具体建议"
}`;
      
      try {
        const res = await fetch(cfg.baseUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + cfg.apiKey
          },
          body: JSON.stringify({
            model: cfg.model,
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.3
          })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '分析失败');
        
        const reportText = data.choices[0].message.content;
        const report = JSON.parse(reportText);
        
        currentPreference = {
          analyzedAt: new Date().toLocaleString(),
          sourceType: 'approved_stories',
          sourceCount: stories.length,
          report
        };
        
        displayResult();
        toast('偏好分析完成！', 'success');
      } catch (e) {
        toast('分析失败：' + e.message, 'error');
      } finally {
        if (btn) {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }
    }
    
    async function analyzeFromModifyItems(items) {
      const cfg = getAIConfig();
      if (!cfg.apiKey) {
        toast('请先配置 AI 接口', 'error');
        return;
      }
      
      const btn = event?.target;
      if (btn) {
        btn.classList.add('loading');
        btn.disabled = true;
      }
      
      const itemList = items.map((item, i) => `
【对比项${i+1}】
修改前：
${item.before}
不满意原因：${item.beforeReason}

修改后：
${item.after}
满意原因：${item.afterReason}
`).join('\n---\n');
      
      const prompt = `你是一位专业的用户偏好分析师。
请通过对比修改前后的故事版本，分析用户的创作偏好和审美倾向。

【对比数据】(${items.length} 组)
${itemList}

请按以下 JSON 格式输出，不要其他文字：
{
  "preferredThemes": ["从修改后提炼的偏好主题"],
  "avoidedThemes": ["从修改前提炼的避免主题"],
  "visualStyle": "画风倾向（从修改后的改进方向推断）",
  "storyStructure": "故事结构偏好（如：喜欢什么结构，避免什么结构）",
  "narrativeStyle": "叙事风格偏好",
  "commonImprovements": ["常见改进方向1", "常见改进方向2"],
  "avoidedPatterns": ["避免的模式1", "避免的模式2"],
  "suggestions": "基于对比分析的优化建议"
}`;
      
      try {
        const res = await fetch(cfg.baseUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + cfg.apiKey
          },
          body: JSON.stringify({
            model: cfg.model,
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.3
          })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '分析失败');
        
        const reportText = data.choices[0].message.content;
        const report = JSON.parse(reportText);
        
        currentPreference = {
          analyzedAt: new Date().toLocaleString(),
          sourceType: 'modify_comparison',
          sourceCount: items.length,
          report
        };
        
        displayResult();
        toast('偏好分析完成！', 'success');
      } catch (e) {
        toast('分析失败：' + e.message, 'error');
      } finally {
        if (btn) {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }
    }
    
    function displayResult() {
      if (!currentPreference) return;
      const r = currentPreference.report;
      const container = document.getElementById('result-content');
      container.innerHTML = `
        <div class="preference-item">
          <label>分析时间</label>
          <span>${currentPreference.analyzedAt}</span>
        </div>
        <div class="preference-item">
          <label>数据来源</label>
          <span>${currentPreference.sourceType === 'approved_stories' ? '已采纳故事' : '修改对比'}（${currentPreference.sourceCount} 条）</span>
        </div>
        ${r.preferredThemes ? `<div class="preference-item"><label>✅ 偏好主题</label><span>${r.preferredThemes.join('、')}</span></div>` : ''}
        ${r.avoidedThemes ? `<div class="preference-item"><label>❌ 避免主题</label><span>${r.avoidedThemes.join('、')}</span></div>` : ''}
        ${r.visualStyle ? `<div class="preference-item"><label>🎨 画风倾向</label><span>${r.visualStyle}</span></div>` : ''}
        ${r.storyStructure ? `<div class="preference-item"><label>📖 故事结构</label><span>${r.storyStructure}</span></div>` : ''}
        ${r.narrativeStyle ? `<div class="preference-item"><label>🎭 叙事风格</label><span>${r.narrativeStyle}</span></div>` : ''}
        ${r.keyElements ? `<div class="preference-item"><label>🔑 关键元素</label><span>${r.keyElements.join('、')}</span></div>` : ''}
        ${r.commonImprovements ? `<div class="preference-item"><label>📈 常见改进</label><span>${r.commonImprovements.join('、')}</span></div>` : ''}
        ${r.avoidedPatterns ? `<div class="preference-item"><label>🚫 避免模式</label><span>${r.avoidedPatterns.join('、')}</span></div>` : ''}
        ${r.suggestions ? `<div class="preference-item"><label>💡 建议</label><span>${r.suggestions}</span></div>` : ''}
      `;
      document.getElementById('result-panel').style.display = 'block';
    }
    
    function downloadPreference() {
      if (!currentPreference) return;
      const blob = new Blob([JSON.stringify(currentPreference, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'preference-analysis.json';
      a.click();
      URL.revokeObjectURL(url);
      toast('偏好报告已下载！请上传到 GitHub', 'success');
    }
    
    function copyPreference() {
      if (!currentPreference) return;
      const text = JSON.stringify(currentPreference, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        toast('已复制到剪贴板', 'success');
      });
    }
    
    function toast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 添加默认的故事输入框
      addManualStory();
      addManualStory();
      addModifyItem();
    });
  </script>
</body>
</html>
