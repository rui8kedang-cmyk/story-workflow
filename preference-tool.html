<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馃 鍋忓ソ鍒嗘瀽宸ュ叿</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #161b24;
      --surface2: #1e2535;
      --border: #2a3347;
      --accent1: #7c6af7;
      --accent2: #3db8a4;
      --green: #4cca74;
      --red: #f05555;
      --text: #dce3f0;
      --muted: #6b7a99;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; padding: 40px; }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 32px; margin-bottom: 8px; }
    header p { color: var(--muted); font-size: 14px; }
    
    .tabs { display: flex; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .tab { padding: 12px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
    .tab:hover { background: var(--surface2); }
    .tab.active { background: var(--accent1); border-color: var(--accent1); }
    
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; display: none; }
    .panel.active { display: block; }
    
    .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .panel-header h2 { font-size: 18px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    
    .btn { padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all .2s; }
    .btn-primary { background: var(--accent1); color: white; }
    .btn-primary:hover { background: #6b59e6; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-success { background: var(--green); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn-accent { background: var(--accent2); color: white; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    
    .story-list { display: flex; flex-direction: column; gap: 12px; }
    .story-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .story-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .story-card-header h3 { font-size: 15px; flex: 1; }
    .story-card-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .story-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    
    .preference-result { background: rgba(124,106,247,0.1); border: 1px solid var(--accent1); border-radius: 8px; padding: 20px; margin-top: 24px; }
    .preference-result h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent1); }
    .preference-item { margin-bottom: 12px; }
    .preference-item label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
    .preference-item span { font-size: 14px; }
    
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; animation: slideIn .3s; }
    .toast.success { background: var(--green); color: white; }
    .toast.error { background: var(--red); color: white; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .loading { opacity: .6; pointer-events: none; }
    .loading::after { content: '...'; animation: dots 1s infinite; }
    @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
    
    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: bold; color: var(--accent1); }
    .stat-box .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    
    .section-title { font-size: 14px; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    
    footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 12px; }
    
    .config-row { display: flex; gap: 12px; align-items: flex-end; }
    .config-row .form-group { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>馃 鍋忓ソ鍒嗘瀽宸ュ叿</h1>
      <p>鍒嗘瀽浣犵殑鏁呬簨鍋忓ソ锛岀敓鎴愬彲澶嶇敤鐨勫亸濂芥妧鑳芥枃浠?/p>
    </header>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('main')">馃帥锔?鎬绘帶闈㈡澘</div>
      <div class="tab" onclick="switchTab('manual')">鉁忥笍 鎵嬪姩杈撳叆鏁呬簨</div>
      <div class="tab" onclick="switchTab('modify')">馃攧 淇敼璇勪环瀵规瘮</div>
    </div>
    
    <!-- Panel 1: 鎬绘帶闈㈡澘 -->
    <div class="panel active" id="panel-main">
      <div class="panel-header">
        <h2>馃帥锔?鎬绘帶闈㈡澘</h2>
      </div>
      
      <!-- 缁熻鏁版嵁 -->
      <div class="stats-grid">
        <div class="stat-box">
          <div class="num" id="stat-manual">0</div>
          <div class="label">鎵嬪姩杈撳叆鏁呬簨</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-modify">0</div>
          <div class="label">淇敼瀵规瘮椤?/div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-total">0</div>
          <div class="label">鎬绘暟鎹潯鏁?/div>
        </div>
      </div>
      
      <!-- AI 閰嶇疆 -->
      <div class="section-title">馃敡 AI 鎺ュ彛閰嶇疆</div>
      <div class="config-row">
        <div class="form-group">
          <label>Base URL</label>
          <input type="text" id="ai-base-url" placeholder="濡傦細https://api.openai.com" />
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="ai-api-key" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label>妯″瀷</label>
          <input type="text" id="ai-model" placeholder="gpt-4o" />
        </div>
        <button class="btn btn-ghost" onclick="saveAIConfig()">馃捑 淇濆瓨閰嶇疆</button>
      </div>
      
      <!-- 涓昏鎿嶄綔 -->
      <div class="section-title" style="margin-top:24px">馃幆 鏍稿績鎿嶄綔</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="analyzeAll()">
          <span>馃</span> 鍋忓ソ鍒嗘瀽
        </button>
        <button class="btn btn-success" onclick="exportSkill()">
          <span>馃摝</span> 缁撴灉杈撳嚭 (Skill)
        </button>
      </div>
      
      <!-- 閰嶇疆绠＄悊 -->
      <div class="section-title">馃捑 鏁版嵁绠＄悊</div>
      <div class="btn-group">
        <button class="btn btn-accent" onclick="saveAllData()">
          <span>馃捑</span> 淇濆瓨鍏ㄩ儴鏁版嵁
        </button>
        <button class="btn btn-ghost" onclick="loadAllData()">
          <span>馃搨</span> 璇诲彇淇濆瓨鏁版嵁
        </button>
        <button class="btn btn-ghost" onclick="downloadDataFile()">
          <span>馃摜</span> 涓嬭浇鏁版嵁鏂囦欢
        </button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">
          <span>馃摛</span> 瀵煎叆鏁版嵁鏂囦欢
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importDataFile(event)" />
      </div>
      
      <!-- 鍒嗘瀽缁撴灉 -->
      <div class="preference-result" id="result-panel" style="display:none">
        <h3>馃搳 鍋忓ソ鍒嗘瀽缁撴灉</h3>
        <div id="result-content"></div>
      </div>
    </div>
    
    <!-- Panel 2: 鎵嬪姩杈撳叆鏁呬簨 -->
    <div class="panel" id="panel-manual">
      <div class="panel-header">
        <h2>鉁忥笍 鎵嬪姩杈撳叆浣犵殑鏁呬簨</h2>
      </div>
      
      <div id="manual-stories" class="story-list"></div>
      
      <div style="margin-top:16px">
        <button class="btn btn-ghost" onclick="addManualStory()">
          <span>鉃?/span> 娣诲姞鏁呬簨
        </button>
      </div>
    </div>
    
    <!-- Panel 3: 淇敼璇勪环瀵规瘮 -->
    <div class="panel" id="panel-modify">
      <div class="panel-header">
        <h2>馃攧 淇敼鍓嶅悗瀵规瘮鍒嗘瀽</h2>
      </div>
      
      <div id="modify-list"></div>
      
      <div style="margin-top:16px">
        <button class="btn btn-ghost" onclick="addModifyItem()">
          <span>鉃?/span> 娣诲姞瀵规瘮椤?
        </button>
      </div>
    </div>
    
    <footer>
      <p>鍋忓ソ鍒嗘瀽鐢ㄤ簬浼樺寲涓绘祦绋嬬殑鍒涙剰鐢熸垚璐ㄩ噺</p>
    </footer>
  </div>

  <script>
    // 鏁版嵁瀛樺偍
    let manualStories = [];
    let modifyItems = [];
    let currentPreference = null;
    
    // ========== 鍒濆鍖?==========
    document.addEventListener('DOMContentLoaded', () => {
      loadAIConfig();
      loadFromStorage();
      updateStats();
      
      // 榛樿娣诲姞涓や釜杈撳叆妗?
      if (manualStories.length === 0) {
        addManualStory();
        addManualStory();
      } else {
        renderManualStories();
      }
      
      if (modifyItems.length === 0) {
        addModifyItem();
      } else {
        renderModifyItems();
      }
    });
    
    // ========== Tab 鍒囨崲 ==========
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`panel-${tabName}`).classList.add('active');
      
      if (tabName === 'main') {
        updateStats();
      }
    }
    
    // ========== AI 閰嶇疆 ==========
    function loadAIConfig() {
      document.getElementById('ai-base-url').value = localStorage.getItem('pref_ai_base_url') || '';
      document.getElementById('ai-api-key').value = localStorage.getItem('pref_ai_api_key') || '';
      document.getElementById('ai-model').value = localStorage.getItem('pref_ai_model') || 'gpt-4o';
    }
    
    function saveAIConfig() {
      localStorage.setItem('pref_ai_base_url', document.getElementById('ai-base-url').value.trim());
      localStorage.setItem('pref_ai_api_key', document.getElementById('ai-api-key').value.trim());
      localStorage.setItem('pref_ai_model', document.getElementById('ai-model').value.trim());
      toast('AI 閰嶇疆宸蹭繚瀛?, 'success');
    }
    
    function getAIConfig() {
      return {
        baseUrl: document.getElementById('ai-base-url').value.trim() || localStorage.getItem('pref_ai_base_url') || '',
        apiKey: document.getElementById('ai-api-key').value.trim() || localStorage.getItem('pref_ai_api_key') || '',
        model: document.getElementById('ai-model').value.trim() || localStorage.getItem('pref_ai_model') || 'gpt-4o'
      };
    }
    
    // ========== 缁熻鏇存柊 ==========
    function updateStats() {
      const manualCount = collectManualStories().length;
      const modifyCount = collectModifyItems().length;
      document.getElementById('stat-manual').textContent = manualCount;
      document.getElementById('stat-modify').textContent = modifyCount;
      document.getElementById('stat-total').textContent = manualCount + modifyCount;
    }
    
    // ========== 鎵嬪姩杈撳叆鏁呬簨 ==========
    let manualStoryCount = 0;
    
    function addManualStory(data = null) {
      manualStoryCount++;
      const container = document.getElementById('manual-stories');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `manual-${manualStoryCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>鏁呬簨 ${manualStoryCount}</h3>
          <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeManualStory(${manualStoryCount})">馃棏锔?鍒犻櫎</button>
        </div>
        <div class="form-group">
          <label>鏍囬</label>
          <input type="text" class="manual-title" placeholder="鏁呬簨鏍囬" value="${data?.title || ''}" />
        </div>
        <div class="form-group">
          <label>鏁呬簨鍐呭</label>
          <textarea class="manual-story" placeholder="璇︾粏鎻忚堪鏁呬簨">${data?.story || ''}</textarea>
        </div>
        <div class="form-group">
          <label>鏍囩锛堢敤閫楀彿鍒嗛殧锛?/label>
          <input type="text" class="manual-tags" placeholder="娓╂儏, 鎴愰暱, 鍙嶈浆" value="${data?.tags?.join(', ') || ''}" />
        </div>
      `;
      container.appendChild(div);
      
      // 杈撳叆鍙樺寲鏃惰嚜鍔ㄤ繚瀛?
      div.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => {
          saveToStorage();
          updateStats();
        });
      });
    }
    
    function removeManualStory(id) {
      document.getElementById(`manual-${id}`)?.remove();
      saveToStorage();
      updateStats();
    }
    
    function renderManualStories() {
      const container = document.getElementById('manual-stories');
      container.innerHTML = '';
      manualStories.forEach(s => addManualStory(s));
    }
    
    function collectManualStories() {
      const stories = [];
      document.querySelectorAll('#manual-stories .story-card').forEach(card => {
        const title = card.querySelector('.manual-title')?.value?.trim();
        const story = card.querySelector('.manual-story')?.value?.trim();
        const tagsStr = card.querySelector('.manual-tags')?.value || '';
        if (title && story) {
          stories.push({
            title,
            story,
            tags: tagsStr.split(',').map(t => t.trim()).filter(t => t)
          });
        }
      });
      return stories;
    }
    
    // ========== 淇敼璇勪环瀵规瘮 ==========
    let modifyCount = 0;
    
    function addModifyItem(data = null) {
      modifyCount++;
      const container = document.getElementById('modify-list');
      const div = document.createElement('div');
      div.className = 'story-card';
      div.id = `modify-${modifyCount}`;
      div.innerHTML = `
        <div class="story-card-header">
          <h3>瀵规瘮椤?${modifyCount}</h3>
          <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeModifyItem(${modifyCount})">馃棏锔?鍒犻櫎</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div class="form-group">
              <label>淇敼鍓嶏紙鍘熷鐗堟湰锛?/label>
              <textarea class="modify-before" placeholder="鍘熷鏁呬簨鍐呭">${data?.before || ''}</textarea>
            </div>
            <div class="form-group">
              <label>涓轰粈涔堜笉婊℃剰</label>
              <textarea class="modify-before-reason" placeholder="鎻忚堪涓嶆弧鎰忕殑鍘熷洜">${data?.beforeReason || ''}</textarea>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>淇敼鍚庯紙鏀硅繘鐗堟湰锛?/label>
              <textarea class="modify-after" placeholder="淇敼鍚庣殑鏁呬簨鍐呭">${data?.after || ''}</textarea>
            </div>
            <div class="form-group">
              <label>涓轰粈涔堟弧鎰?/label>
              <textarea class="modify-after-reason" placeholder="鎻忚堪婊℃剰鐨勫師鍥?>${data?.afterReason || ''}</textarea>
            </div>
          </div>
        </div>
      `;
      container.appendChild(div);
      
      // 杈撳叆鍙樺寲鏃惰嚜鍔ㄤ繚瀛?
      div.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => {
          saveToStorage();
          updateStats();
        });
      });
    }
    
    function removeModifyItem(id) {
      document.getElementById(`modify-${id}`)?.remove();
      saveToStorage();
      updateStats();
    }
    
    function renderModifyItems() {
      const container = document.getElementById('modify-list');
      container.innerHTML = '';
      modifyItems.forEach(item => addModifyItem(item));
    }
    
    function collectModifyItems() {
      const items = [];
      document.querySelectorAll('#modify-list .story-card').forEach(card => {
        const before = card.querySelector('.modify-before')?.value?.trim();
        const after = card.querySelector('.modify-after')?.value?.trim();
        if (before && after) {
          items.push({
            before,
            beforeReason: card.querySelector('.modify-before-reason')?.value?.trim() || '',
            after,
            afterReason: card.querySelector('.modify-after-reason')?.value?.trim() || ''
          });
        }
      });
      return items;
    }
    
    // ========== 鏈湴瀛樺偍 ==========
    function saveToStorage() {
      const data = {
        manualStories: collectManualStories(),
        modifyItems: collectModifyItems(),
        savedAt: new Date().toISOString()
      };
      localStorage.setItem('pref_tool_data', JSON.stringify(data));
    }
    
    function loadFromStorage() {
      try {
        const saved = localStorage.getItem('pref_tool_data');
        if (saved) {
          const data = JSON.parse(saved);
          manualStories = data.manualStories || [];
          modifyItems = data.modifyItems || [];
        }
      } catch (e) {
        console.error('鍔犺浇瀛樺偍鏁版嵁澶辫触', e);
      }
    }
    
    // ========== 鏁版嵁绠＄悊鎸夐挳 ==========
    function saveAllData() {
      saveToStorage();
      toast('鏁版嵁宸蹭繚瀛樺埌娴忚鍣ㄦ湰鍦?, 'success');
    }
    
    function loadAllData() {
      loadFromStorage();
      renderManualStories();
      renderModifyItems();
      updateStats();
      toast('鏁版嵁宸叉仮澶?, 'success');
    }
    
    function downloadDataFile() {
      const data = {
        manualStories: collectManualStories(),
        modifyItems: collectModifyItems(),
        exportedAt: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `preference-data-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('鏁版嵁鏂囦欢宸蹭笅杞?, 'success');
    }
    
    function importDataFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.manualStories) manualStories = data.manualStories;
          if (data.modifyItems) modifyItems = data.modifyItems;
          
          renderManualStories();
          renderModifyItems();
          saveToStorage();
          updateStats();
          toast('鏁版嵁瀵煎叆鎴愬姛', 'success');
        } catch (err) {
          toast('瀵煎叆澶辫触锛氭枃浠舵牸寮忛敊璇?, 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    
    // ========== 鍋忓ソ鍒嗘瀽 ==========
    async function analyzeAll() {
      const manual = collectManualStories();
      const modify = collectModifyItems();
      
      if (manual.length === 0 && modify.length === 0) {
        toast('璇疯嚦灏戣緭鍏ヤ竴浜涙晠浜嬫垨瀵规瘮鏁版嵁', 'error');
        return;
      }
      
      const cfg = getAIConfig();
      if (!cfg.apiKey) {
        toast('璇峰厛閰嶇疆 AI 鎺ュ彛', 'error');
        return;
      }
      
      const btn = event.target;
      btn.classList.add('loading');
      btn.disabled = true;
      
      // 鏋勫缓缁煎悎鍒嗘瀽 prompt
      let prompt = `浣犳槸涓€浣嶄笓涓氱殑鐢ㄦ埛鍋忓ソ鍒嗘瀽甯堛€?
璇风患鍚堝垎鏋愪互涓嬫暟鎹紝鎬荤粨鐢ㄦ埛鐨勫垱浣滃亸濂姐€?

`;
      
      if (manual.length > 0) {
        prompt += `銆愭墜鍔ㄨ緭鍏ョ殑鍠滄鐨勬晠浜嬨€?${manual.length} 涓?\n`;
        prompt += manual.map((s, i) => `
銆愭晠浜?{i+1}銆?{s.title}
鍐呭锛?{s.story}
鏍囩锛?{s.tags?.join('銆?) || '鏃?}
`).join('\n');
        prompt += '\n\n';
      }
      
      if (modify.length > 0) {
        prompt += `銆愪慨鏀瑰墠鍚庡姣旀暟鎹€?${modify.length} 缁?\n`;
        prompt += modify.map((item, i) => `
銆愬姣?{i+1}銆?
淇敼鍓嶏細${item.before}
涓嶆弧鎰忓師鍥狅細${item.beforeReason}
淇敼鍚庯細${item.after}
婊℃剰鍘熷洜锛?{item.afterReason}
`).join('\n---\n');
      }
      
      prompt += `

璇锋寜浠ヤ笅 JSON 鏍煎紡杈撳嚭锛屼笉瑕佸叾浠栨枃瀛楋細
{
  "preferredThemes": ["鍋忓ソ涓婚1", "鍋忓ソ涓婚2"],
  "avoidedThemes": ["閬垮厤涓婚1", "閬垮厤涓婚2"],
  "visualStyle": "鐢婚鍊惧悜鎻忚堪锛堢畝鐭級",
  "storyStructure": "鏁呬簨缁撴瀯鍋忓ソ鎻忚堪锛堢畝鐭級",
  "narrativeStyle": "鍙欎簨椋庢牸鍋忓ソ锛堝锛氬弽杞€佹俯鎯呫€佸菇榛橈級",
  "targetAudience": "鐩爣鍙椾紬鎺ㄦ柇",
  "keyElements": ["鍏抽敭鍏冪礌1", "鍏抽敭鍏冪礌2"],
  "coreConcepts": ["鏍稿績姒傚康1", "鏍稿績姒傚康2"],
  "suggestions": "缁欑敤鎴风殑鍏蜂綋寤鸿"
}`;
      
      try {
        const res = await fetch(cfg.baseUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + cfg.apiKey
          },
          body: JSON.stringify({
            model: cfg.model,
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.3
          })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '鍒嗘瀽澶辫触');
        
        const reportText = data.choices[0].message.content;
        const report = JSON.parse(reportText);
        
        currentPreference = {
          analyzedAt: new Date().toLocaleString(),
          sourceCount: { manual: manual.length, modify: modify.length },
          report
        };
        
        displayResult();
        toast('鍋忓ソ鍒嗘瀽瀹屾垚锛?, 'success');
      } catch (e) {
        toast('鍒嗘瀽澶辫触锛? + e.message, 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
    
    function displayResult() {
      if (!currentPreference) return;
      const r = currentPreference.report;
      const container = document.getElementById('result-content');
      container.innerHTML = `
        <div class="preference-item">
          <label>鍒嗘瀽鏃堕棿</label>
          <span>${currentPreference.analyzedAt}</span>
        </div>
        <div class="preference-item">
          <label>鏁版嵁鏉ユ簮</label>
          <span>鎵嬪姩鏁呬簨 ${currentPreference.sourceCount.manual} 鏉?+ 瀵规瘮鏁版嵁 ${currentPreference.sourceCount.modify} 鏉?/span>
        </div>
        ${r.preferredThemes?.length ? `<div class="preference-item"><label>鉁?鍋忓ソ涓婚</label><span>${r.preferredThemes.join('銆?)}</span></div>` : ''}
        ${r.avoidedThemes?.length ? `<div class="preference-item"><label>鉂?閬垮厤涓婚</label><span>${r.avoidedThemes.join('銆?)}</span></div>` : ''}
        ${r.visualStyle ? `<div class="preference-item"><label>馃帹 鐢婚鍊惧悜</label><span>${r.visualStyle}</span></div>` : ''}
        ${r.storyStructure ? `<div class="preference-item"><label>馃摉 鏁呬簨缁撴瀯</label><span>${r.storyStructure}</span></div>` : ''}
        ${r.narrativeStyle ? `<div class="preference-item"><label>馃幁 鍙欎簨椋庢牸</label><span>${r.narrativeStyle}</span></div>` : ''}
        ${r.targetAudience ? `<div class="preference-item"><label>馃懃 鐩爣鍙椾紬</label><span>${r.targetAudience}</span></div>` : ''}
        ${r.keyElements?.length ? `<div class="preference-item"><label>馃攽 鍏抽敭鍏冪礌</label><span>${r.keyElements.join('銆?)}</span></div>` : ''}
        ${r.coreConcepts?.length ? `<div class="preference-item"><label>馃挕 鏍稿績姒傚康</label><span>${r.coreConcepts.join('銆?)}</span></div>` : ''}
        ${r.suggestions ? `<div class="preference-item"><label>馃摑 寤鸿</label><span>${r.suggestions}</span></div>` : ''}
      `;
      document.getElementById('result-panel').style.display = 'block';
    }
    
    // ========== 瀵煎嚭 Skill ==========
    function exportSkill() {
      if (!currentPreference) {
        toast('璇峰厛杩涜鍋忓ソ鍒嗘瀽', 'error');
        return;
      }
      
      const r = currentPreference.report;
      const skill = {
        name: "鐢ㄦ埛鏁呬簨鍋忓ソ",
        description: "鍩轰簬鐢ㄦ埛鍘嗗彶鏁版嵁鐨勬晠浜嬪垱浣滃亸濂?,
        version: "1.0",
        createdAt: new Date().toISOString(),
        preference: {
          themes: {
            preferred: r.preferredThemes || [],
            avoided: r.avoidedThemes || []
          },
          style: {
            visual: r.visualStyle || '',
            narrative: r.narrativeStyle || '',
            structure: r.storyStructure || ''
          },
          elements: r.keyElements || [],
          coreConcepts: r.coreConcepts || [],
          targetAudience: r.targetAudience || '',
          suggestions: r.suggestions || ''
        },
        metadata: {
          analyzedAt: currentPreference.analyzedAt,
          sourceCount: currentPreference.sourceCount
        }
      };
      
      const blob = new Blob([JSON.stringify(skill, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `preference-skill-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Skill 鏂囦欢宸蹭笅杞?, 'success');
    }
    
    // ========== Toast ==========
    function toast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
