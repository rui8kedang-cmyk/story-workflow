<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>馃幀 灏忔晠浜嬪垱浣滃伐浣滄祦 路 鎵嬫満鐗?/title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0f14;--surface:#161b24;--surface2:#1e2535;--border:#2a3347;
--accent1:#7c6af7;--accent2:#3db8a4;--accent3:#f5a623;
--green:#4cca74;--red:#f05555;--text:#dce3f0;--muted:#6b7a99;--radius:12px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;
min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* 椤舵爮 */
header{display:flex;align-items:center;gap:10px;padding:12px 16px;
background:linear-gradient(135deg,#1a1040,#0d1a2e);border-bottom:1px solid var(--border);
position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
header .logo{font-size:22px}
header h1{font-size:16px;font-weight:700}
header .hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* 杩涘害鐐?*/
.progress-dots{display:flex;gap:6px;align-items:center;padding:10px 16px;
background:var(--surface);border-bottom:1px solid var(--border);
margin-top:52px;position:fixed;top:0;left:0;right:0;z-index:99;height:36px}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s}
.pdot.done{background:var(--green)}
.pdot.active{background:var(--accent1);box-shadow:0 0 6px var(--accent1)}
.pdot-label{font-size:11px;color:var(--muted);margin-left:4px}

/* 搴曢儴 Tab */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:56px;display:flex;
background:var(--surface);border-top:1px solid var(--border);z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
cursor:pointer;color:var(--muted);transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab-item.active{color:var(--accent1)}
.tab-item .tab-icon{font-size:20px;margin-bottom:2px}
.tab-item .tab-label{font-size:11px;font-weight:600}

/* 鍐呭鍖?*/
.content{margin-top:88px;margin-bottom:56px;padding:12px 12px 20px;min-height:calc(100vh - 144px)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* 鎸夐挳 */
.btn{padding:10px 16px;border-radius:8px;border:none;font-size:14px;font-weight:600;
cursor:pointer;display:inline-flex;align-items:center;gap:6px;min-height:44px;
transition:opacity .15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent1);color:#fff}
.btn-teal{background:var(--accent2);color:#fff}
.btn-orange{background:var(--accent3);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:12px;min-height:36px}
.btn-danger{background:rgba(240,85,85,.12);color:var(--red);border:1px solid rgba(240,85,85,.3)}
.btn-success{background:rgba(76,202,116,.12);color:var(--green);border:1px solid rgba(76,202,116,.3)}
.btn-block{width:100%;justify-content:center}

/* 琛ㄥ崟 */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:12px;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{
width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
border-radius:8px;padding:10px 12px;font-size:14px;outline:none;min-height:44px}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent1)}

/* 鍒涙剰鍗＄墖 */
.idea-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:14px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;
animation:fadeIn .3s ease}
.idea-card.approved{border-color:rgba(76,202,116,.5);background:#0a1f12}
.idea-card.rejected{opacity:.4}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.idea-card .ic-top{display:flex;align-items:flex-start;gap:8px}
.idea-card .ic-num{font-size:12px;color:var(--muted);flex-shrink:0;padding-top:2px}
.idea-card .ic-title{font-size:15px;font-weight:600;flex:1}
.idea-card .ic-body{font-size:13px;color:var(--muted);line-height:1.6}
.idea-card .ic-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--muted)}
.idea-card .ic-actions{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.score-badge{font-size:12px;padding:3px 10px;border-radius:20px;
background:rgba(124,106,247,.12);color:var(--accent1);margin-left:auto}

/* 鍓ф湰鍗＄墖 */
.script-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
overflow:hidden;margin-bottom:12px;animation:fadeIn .3s ease}
.sc-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);
cursor:pointer;min-height:48px}
.sc-header .sc-title{font-size:14px;font-weight:700;flex:1}
.sc-header .sc-dur{font-size:12px;color:var(--muted)}
.sc-header .sc-toggle{font-size:14px;color:var(--muted);transition:transform .2s}
.script-card .sc-body{padding:14px;display:none;flex-direction:column;gap:10px}
.script-card.expanded .sc-body{display:flex}
.script-card.expanded .sc-toggle{transform:rotate(90deg)}

/* 鍒嗛暅鍗＄墖锛堟墜鏈虹増鐢ㄥ崱鐗囦唬鏇胯〃鏍硷級 */
.shot-card{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px}
.shot-card .shot-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.shot-badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:10px;
background:rgba(61,184,164,.12);color:var(--accent2);white-space:nowrap;font-weight:600}
.shot-card .shot-info{font-size:13px;line-height:1.6;color:var(--text)}
.shot-card .shot-meta{font-size:12px;color:var(--muted);margin-top:4px}

/* 鎻愮ず璇嶅崱鐗?*/
.prompt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:14px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;
animation:fadeIn .3s ease}
.prompt-card .pc-header{display:flex;align-items:center;gap:8px}
.prompt-card .pc-shot{font-size:12px;color:var(--accent3);font-weight:700}
.prompt-card .pc-title{font-size:14px;font-weight:600;flex:1}
.prompt-card .pc-en{font-size:13px;color:#b0c4f0;background:#0d1625;border-radius:8px;
padding:12px;line-height:1.6;border-left:3px solid var(--accent3);white-space:pre-wrap;word-break:break-word}
.prompt-card .pc-meta{display:flex;gap:8px;flex-wrap:wrap}
.prompt-card .pc-tag{font-size:12px;padding:3px 10px;border-radius:20px;
background:rgba(245,166,35,.12);color:var(--accent3)}

/* 閰嶇疆鎶藉眽 */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-85vw;bottom:0;width:85vw;max-width:360px;
background:var(--surface);z-index:201;overflow-y:auto;padding:20px 16px;
transition:right .3s ease;border-left:1px solid var(--border)}
.drawer-overlay.open .drawer{right:0}
.drawer h3{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:12px;
text-transform:uppercase;letter-spacing:.8px}
.drawer .divider{height:1px;background:var(--border);margin:14px 0}
.drawer .close-drawer{position:absolute;top:12px;right:12px;background:none;border:none;
color:var(--muted);font-size:20px;cursor:pointer;min-height:44px;min-width:44px;
display:flex;align-items:center;justify-content:center}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
align-items:center;justify-content:center;z-index:300;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}

/* Toast */
#toast-container{position:fixed;top:60px;left:12px;right:12px;display:flex;
flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;
background:var(--surface2);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.5);
animation:toastIn .3s ease;pointer-events:auto}
.toast.success{border-color:rgba(76,202,116,.4);color:var(--green)}
.toast.error{border-color:rgba(240,85,85,.4);color:var(--red)}
.toast.info{border-color:rgba(124,106,247,.4);color:var(--accent1)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* 鏃ュ織闈㈡澘 */
#log-panel{position:fixed;bottom:56px;left:0;right:0;height:0;max-height:50vh;
background:#0a0c10;border-top:1px solid var(--border);display:flex;flex-direction:column;
z-index:150;transition:height .25s ease;font-family:Consolas,Monaco,monospace}
#log-panel.open{height:240px}
.log-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#12151c;
border-bottom:1px solid var(--border);flex-shrink:0}
.log-title{font-size:13px;font-weight:600;color:var(--text)}
.log-count{font-size:12px;color:var(--muted)}
.log-actions{margin-left:auto;display:flex;gap:8px}
.log-actions button{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;
min-height:36px;padding:4px 8px}
#log-body{flex:1;overflow-y:auto;padding:8px 12px;font-size:12px}
.log-entry{margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap}
.log-time{color:var(--muted);flex-shrink:0}
.log-tag{padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600}
.log-tag.ok{background:rgba(76,202,116,.15);color:var(--green)}
.log-tag.err{background:rgba(240,85,85,.15);color:var(--red)}
.log-tag.info{background:rgba(124,106,247,.15);color:var(--accent1)}
.log-tag.warn{background:rgba(245,166,35,.15);color:var(--accent3)}
.log-msg{flex:1;word-break:break-all}
.log-detail{color:var(--muted);margin-top:2px;white-space:pre-wrap;font-size:11px}
.log-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;
background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}

/* 杩涘害鏉?*/
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;transition:width .3s ease;border-radius:2px}

/* 鍔犺浇 */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 绌虹姸鎬?*/
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .es-icon{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:14px}

/* 涓夊箷姒傝堪 */
.acts-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.act-block{background:var(--surface2);border-radius:8px;padding:10px}
.act-block .act-title{font-size:12px;font-weight:700;margin-bottom:4px}
.act-block .act-body{font-size:13px;line-height:1.6}
</style>
</head>

<script>

function $(id){return document.getElementById(id)}

batch:parseInt($('cfg-batch').value)||5,

// === LOG ===
const LOG={entries:[],errorCount:0};
function addLog(level,msg,detail){
const now=new Date();const ts=now.toTimeString().slice(0,8)+'.'+String(now.getMilliseconds()).padStart(3,'0');
LOG.entries.push({ts,level,msg,detail:detail||''});if(level==='err')LOG.errorCount++;
const body=$('log-body');const div=document.createElement('div');div.className='log-entry';
div.innerHTML='<span class="log-time">'+ts+'</span><span class="log-tag '+level+'">'+level+'</span><span class="log-msg">'+escHtml(msg)+(detail?'<div class="log-detail">'+escHtml(String(detail).slice(0,2000))+'</div>':'')+'</span>';
body.appendChild(div);body.scrollTop=body.scrollHeight;$('log-count').textContent='('+LOG.entries.length+')';
if(level==='err'){const panel=$('log-panel');if(!panel.classList.contains('open'))panel.classList.add('open');updateLogBadge()}}
function updateLogBadge(){const btn=$('log-toggle');let b=btn.querySelector('.log-badge');

function toggleLogPanel(){const p=$('log-panel');p.classList.toggle('open');if(p.classList.contains('open')){LOG.errorCount=0;updateLogBadge()}}
function clearLog(){LOG.entries=[];LOG.errorCount=0;$('log-body').innerHTML='';$('log-count').textContent='(0)';updateLogBadge()}
function copyLog(){const t=LOG.entries.map(function(e){return '['+e.ts+'] ['+e.level.toUpperCase()+'] '+e.msg+(e.detail?'\n  '+e.detail:'')}).join('\n');navigator.clipboard.writeText(t||'(empty)').then(function(){toast('鏃ュ織宸插鍒?,'success')})}

function tryParseJSON(raw){
try{return JSON.parse(raw)}catch(e){}
var f=raw;
f=f.replace(/:\s*(?!\s*[{\["\d\-]|\s*true|\s*false|\s*null)([^,}\]]+?)\s*([,}\]])/g,function(m,v,end){return ': '+JSON.stringify(v.trim())+end});
f=f.replace(/,\s*([}\]])/g,'$1');
try{return JSON.parse(f)}catch(e){}
f=f.replace(/'([^']*?)'/g,'"$1"');
try{return JSON.parse(f)}catch(e){}
try{return(new Function('return '+raw))()}catch(e){}
JSON.parse(raw)}

try{res=await fetch(cfg.baseUrl+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},body:JSON.stringify(reqBody)})}
catch(netErr){var el1=((performance.now()-t0)/1000).toFixed(1);addLog('err','缃戠粶閿欒 ('+el1+'s)',netErr.message);throw netErr}
var elapsed=((performance.now()-t0)/1000).toFixed(1);
if(!res.ok){var err=await res.text();addLog('err','API 閿欒 '+res.status+' ('+elapsed+'s)',err.slice(0,2000));throw new Error('API Error '+res.status+': '+err)}
addLog('ok','鈫?鍝嶅簲 '+res.status+' ('+elapsed+'s)');
var json=await res.json();var content=json.choices[0].message.content;
addLog('ok','鈫?瀹屾垚 ('+content.length+' chars)');return content}

var shotCount=DB.scripts.reduce(function(a,s){return a+(s.shots||[]).length},0);
var promptCount=DB.prompts.reduce(function(a,p){return a+(p.shots||[]).length},0);
$('badge-ideas').textContent=total;$('badge-scripts').textContent=scriptCount;$('badge-prompts').textContent=promptCount;
// Progress dots
var dots=[total>0,approved>0,scriptCount>0,shotCount>0,promptCount>0];
for(var i=0;i<5;i++){var d=$('pd'+(i+1));d.className='pdot'+(dots[i]?' done':'')}
var label='';
if(promptCount>0)label=promptCount+' 鎻愮ず璇?;
else if(shotCount>0)label=shotCount+' 鍒嗛暅';
else if(scriptCount>0)label=scriptCount+' 鍓ф湰';
else if(approved>0)label=approved+' 宸叉壒鍑?;
else if(total>0)label=total+' 鍒涙剰';
else label='0 鍒涙剰';
$('pd-label').textContent=label}

// === INIT ===
document.addEventListener('DOMContentLoaded',function(){
DB.load();renderIdeas();renderScripts();renderPrompts();updateCounts();
// Load saved config
var savedCfg=localStorage.getItem('workflow_config');
if(savedCfg){try{var cfg=JSON.parse(savedCfg);
if(cfg.baseUrl)$('cfg-base-url').value=cfg.baseUrl;
if(cfg.apiKey)$('cfg-api-key').value=cfg.apiKey;
if(cfg.model)$('cfg-model').value=cfg.model}catch(e){}}
// Auto-save config
['cfg-base-url','cfg-api-key','cfg-model'].forEach(function(id){
$(id).addEventListener('change',function(){
localStorage.setItem('workflow_config',JSON.stringify({baseUrl:$('cfg-base-url').value,apiKey:$('cfg-api-key').value,model:$('cfg-model').value}))})});
// Load preference
if(loadPreferenceFromStorage()){displayPreference(currentPreference)}});

</script>
</body>
</html>
